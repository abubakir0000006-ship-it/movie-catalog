<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieCatalog — фильмы и сериалы</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="logo">MOVIE<span>CATALOG</span></div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск фильмов и сериалов...">
        <button id="searchBtn">Поиск</button>
      </div>
    </div>
    <nav class="nav">
      <div class="container nav-inner">
        <button class="nav-item active" data-type="">Главная</button>
        <button class="nav-item" data-type="movie">Фильмы</button>
        <button class="nav-item" data-type="tv">Сериалы</button>
      </div>
    </nav>
  </header>

  <section class="hero">
    <div class="container">
      <h2 class="section-title">Новинки</h2>
      <div class="carousel" id="carousel"></div>
    </div>
  </section>

  <!-- РЕКЛАМА КАЗИНО НА ГЛАВНОЙ (ВСТАВЬ СВОЮ ССЫЛКУ) -->
  <div class="container">
    <div class="ad-banner" style="background:#1e212b; padding:15px; border-radius:8px; margin: 20px 0; text-align:center;">
      <a href="https://твоя-партнерская-ссылка-казино.com" target="_blank">
        <img src="https://via.placeholder.com/728x90/f5c842/000?text=YOUR+CASINO+AD" style="max-width:100%;" alt="Реклама">
      </a>
    </div>
  </div>

  <main class="container main-layout">
    <aside class="sidebar">
      <h3>Фильтры</h3>

      <div class="filter-group">
        <label>Жанр</label>
        <select id="filterGenre">
          <option value="">Все жанры</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Год</label>
        <select id="filterYear">
          <option value="">Любой год</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Сортировка</label>
        <select id="filterSort">
          <option value="date">По дате</option>
          <option value="rating">По рейтингу</option>
          <option value="title">По названию</option>
        </select>
      </div>

      <button id="resetFilters" class="btn-reset">Сбросить фильтры</button>
    </aside>

    <section class="content">
      <h2 class="section-title" id="catalogTitle">Каталог</h2>
      <div class="movie-grid" id="movieGrid">
        <div class="loading">Загрузка...</div>
      </div>
      <div class="pagination" id="pagination"></div>
    </section>
  </main>

  <div class="modal" id="movieModal">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>Данные о фильмах предоставлены <a href="https://www.themoviedb.org/" target="_blank">TMDB</a>. Сайт использует сторонние источники для показа контента.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
